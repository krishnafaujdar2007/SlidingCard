<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Sliding Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Responsive sizing based on viewport */
            --stage-size: clamp(250px, 75vmin, 450px);
            --half-size: calc(var(--stage-size) / 2);
            --heart-size: calc(var(--stage-size) * 0.56);
            --heart-offset: calc(var(--heart-size) / -2);
            --slide-dist: calc(var(--stage-size) * 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffafcc; /* Romantic Pink background */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        /* Square Stage */
        .square-stage {
            width: var(--stage-size);
            height: var(--stage-size);
            position: relative;
            overflow: visible;
        }

        /* Message Box (Bech wala text jo reveal hoga) */
        #message-box {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: clamp(1.5rem, 6vmin, 2.8rem);
            color: #ff758f;
            z-index: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            word-wrap: break-word;
            opacity: 0;
            transform: scale(0.5); 
        }

        /* Quadrant Styling (White Shutter pieces) */
        .quadrant {
            position: absolute;
            width: var(--half-size);
            height: var(--half-size);
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.6s ease;
            z-index: 10;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Initial positions (Square band) */
        .tl { top: 0; left: 0; border-top-left-radius: 8px; }
        .tr { top: 0; right: 0; border-top-right-radius: 8px; }
        .bl { bottom: 0; left: 0; border-bottom-left-radius: 8px; }
        .br { bottom: 0; right: 0; border-bottom-right-radius: 8px; }

        /* --- BIG CLEAN SVG HEART --- */
        .heart-piece {
            position: absolute;
            width: var(--heart-size); 
            height: var(--heart-size);
            fill: #ff4d6d;
            stroke: white;
            stroke-width: 1.5px;
            filter: drop-shadow(0 3px 6px rgba(255, 77, 109, 0.4));
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }

        /* Heart alignment in corners using dynamic offset */
        .tl .heart-piece { bottom: var(--heart-offset); right: var(--heart-offset); }
        .tr .heart-piece { bottom: var(--heart-offset); left: var(--heart-offset); }
        .bl .heart-piece { top: var(--heart-offset); right: var(--heart-offset); }
        .br .heart-piece { top: var(--heart-offset); left: var(--heart-offset); }

        /* --- SLIDING ANIMATION STATES --- */
        
        .is-open .tl { transform: translate(calc(var(--slide-dist) * -1), calc(var(--slide-dist) * -1)); opacity: 0; }
        .is-open .tr { transform: translate(var(--slide-dist), calc(var(--slide-dist) * -1)); opacity: 0; }
        .is-open .bl { transform: translate(calc(var(--slide-dist) * -1), var(--slide-dist)); opacity: 0; }
        .is-open .br { transform: translate(var(--slide-dist), var(--slide-dist)); opacity: 0; }

        .is-open #message-box {
            opacity: 1;
            transform: scale(1);
        }

        /* Next/Replay Button */
        .next-btn {
            margin-top: clamp(30px, 8vh, 60px);
            padding: 12px 15%;
            background-color: white;
            color: #ff758f;
            border: none;
            border-radius: 50px; 
            font-family: 'Pacifico', cursive;
            font-size: clamp(1rem, 4vmin, 1.3rem);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            text-transform: lowercase;
            z-index: 20;
            min-width: 200px;
            max-width: 90vw;
        }

        .next-btn:active { transform: scale(0.92); }
        .next-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Floating Hearts Animation Background */
        .bg-heart {
            position: absolute;
            color: white;
            font-size: 20px;
            opacity: 0.6;
            animation: float-up 4s linear infinite;
            pointer-events: none;
        }

        @keyframes float-up {
            from { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="square-stage" id="squareStage">
        <!-- Reveal hone wala message -->
        <div id="message-box">I Love You! ❤️</div>

        <!-- Sliding Quadrants -->
        <div class="quadrant tl">
            <svg class="heart-piece" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.7C7.2 20.4 2.7 16.3 2.7 11.3C2.7 7.2 5.9 4 10 4C12.3 4 14.5 5.1 16 6.8C17.5 5.1 19.7 4 22 4C26.1 4 29.3 7.2 29.3 11.3C29.3 16.3 24.8 20.4 17.9 26.7L16 28.5Z"/></svg>
        </div>
        <div class="quadrant tr">
            <svg class="heart-piece" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.7C7.2 20.4 2.7 16.3 2.7 11.3C2.7 7.2 5.9 4 10 4C12.3 4 14.5 5.1 16 6.8C17.5 5.1 19.7 4 22 4C26.1 4 29.3 7.2 29.3 11.3C29.3 16.3 24.8 20.4 17.9 26.7L16 28.5Z"/></svg>
        </div>
        <div class="quadrant bl">
            <svg class="heart-piece" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.7C7.2 20.4 2.7 16.3 2.7 11.3C2.7 7.2 5.9 4 10 4C12.3 4 14.5 5.1 16 6.8C17.5 5.1 19.7 4 22 4C26.1 4 29.3 7.2 29.3 11.3C29.3 16.3 24.8 20.4 17.9 26.7L16 28.5Z"/></svg>
        </div>
        <div class="quadrant br">
            <svg class="heart-piece" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.7C7.2 20.4 2.7 16.3 2.7 11.3C2.7 7.2 5.9 4 10 4C12.3 4 14.5 5.1 16 6.8C17.5 5.1 19.7 4 22 4C26.1 4 29.3 7.2 29.3 11.3C29.3 16.3 24.8 20.4 17.9 26.7L16 28.5Z"/></svg>
        </div>
    </div>

    <button class="next-btn" id="nextBtn">next</button>

    <script>
        const squareStage = document.getElementById('squareStage');
        const nextBtn = document.getElementById('nextBtn');
        const messageBox = document.getElementById('message-box');
        
        // Sequence of messages
        const messages = [
            "Ek baat bolu? 🙈",
            "You are my favorite! ❤️",
            "Always keep smiling 😊",
            "Duniya ki sabse cute ladki 🌸",
            "Bas tumhare liye... 🎁",
            "Missing you badly... 🥺",
            "I Love You! ❤️"
        ];
        
        let msgIndex = 0;
        let isAnimating = false;

        // Background hearts animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.innerHTML = '♥';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.getElementById('hearts-container').appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
        setInterval(createHeart, 700);

        nextBtn.addEventListener('click', () => {
            if (isAnimating) return;

            // WhatsApp Redirect aur Replay logic
            if (nextBtn.innerText === 'replay') {
                window.open("https://wa.me/917891070996", "_blank");
                msgIndex = 0;
                nextBtn.innerText = 'next';
                return;
            }

            isAnimating = true;
            nextBtn.disabled = true;

            // Naya message set karein
            messageBox.innerText = messages[msgIndex];

            // Shutter open karein
            squareStage.classList.add('is-open');

            // Button change logic
            if (msgIndex === messages.length - 1) {
                setTimeout(() => {
                    nextBtn.innerText = "replay";
                }, 1000);
            }

            // Animation timing logic
            setTimeout(() => {
                squareStage.classList.remove('is-open');

                setTimeout(() => {
                    if (nextBtn.innerText !== 'replay') {
                        msgIndex = (msgIndex + 1) % messages.length;
                    }
                    isAnimating = false;
                    nextBtn.disabled = false;
                }, 800); 
            }, 1800); 
        });
    </script>
</body>
</html>
